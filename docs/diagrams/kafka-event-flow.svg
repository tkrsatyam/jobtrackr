  <line x1="562" y1="193" x2="610" y2="143" stroke="#C0522A" stroke-width="0.8" marker-end="url(#kc)"/>
  <line x1="562" y1="147" x2="610" y2="238" stroke="#C0522A" stroke-width="0.8" marker-end="url(#kc)"/>
  <line x1="562" y1="239" x2="610" y2="245" stroke="#C0522A" stroke-width="0.8" marker-end="url(#kc)"/>
  <line x1="562" y1="331" x2="610" y2="258" stroke="#C0522A" stroke-width="0.8" marker-end="url(#kc)"/>

  <!-- Legend -->
  <line x1="14" y1="368" x2="44" y2="368" stroke="#C49020" stroke-width="1" marker-end="url(#kp)"/>
