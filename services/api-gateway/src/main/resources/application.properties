spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.routes[1].id=application-service
spring.cloud.gateway.routes[1].uri=lb://application-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/applications/**

spring.cloud.gateway.routes[2].id=reminder-service
spring.cloud.gateway.routes[2].uri=lb://reminder-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reminders/**

spring.cloud.gateway.routes[3].id=document-service
spring.cloud.gateway.routes[3].uri=lb://document-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/documents/**

spring.cloud.gateway.routes[4].id=contact-service
spring.cloud.gateway.routes[4].uri=lb://contact-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/contacts/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[6].id=analytics-service
spring.cloud.gateway.routes[6].uri=lb://analytics-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/analytics/**

# --- JWT secret (must match User Service exactly) ---
# ** To be added later **
app.jwt.secret=