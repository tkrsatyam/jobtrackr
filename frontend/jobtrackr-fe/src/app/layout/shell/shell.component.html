<div class="shell-layout" [class.sidebar-collapsed]="sidebarService.isCollapsed()">
    <app-topbar class="shell-topbar" />
    @if (!sidebarService.isCollapsed()) {
        <div class="shell-backdrop" (click)="sidebarService.toggle()"></div>
    }
    <app-sidebar class="shell-sidebar" />
    <main class="shell-content">
        <router-outlet />
    </main>
</div>
