<svg width="780" height="790" viewBox="0 0 780 790" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; }
  </style>

  <rect width="780" height="790" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="26" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">JobTrackr — Deployment Architecture (Free Tier · $0/month)</text>
  <text x="390" y="44" font-size="11" fill="#999" text-anchor="middle">4 services on Render · Angular on Vercel · all infrastructure on managed free tiers</text>

  <!-- VERCEL ZONE -->
  <rect x="24" y="56" width="732" height="80" rx="10" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="40" y="74" font-size="10" fill="#bbb">Vercel — Angular hosting (always on, instant deploys)</text>
  <rect x="240" y="80" width="300" height="46" rx="8" fill="#EDE9FD" stroke="#7C6EE0" stroke-width="0.8"/>
  <text x="390" y="100" font-size="13" font-weight="600" fill="#3D2FA0" text-anchor="middle">Angular SPA</text>
  <text x="390" y="116" font-size="11" fill="#5A4CB8" text-anchor="middle">jobtrackr.vercel.app · auto-deploy on git push to main</text>

  <!-- Arrow Angular to Gateway -->
  <line x1="390" y1="126" x2="390" y2="170" stroke="#999" stroke-width="1" marker-end="url(#a1)"/>
  <text x="404" y="152" font-size="10" fill="#bbb">HTTPS</text>

  <!-- RENDER ZONE -->
  <rect x="24" y="170" width="732" height="210" rx="10" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="40" y="188" font-size="10" fill="#bbb">Render — 4 free web services (spins down after 15 min inactivity · cold-start ~30s)</text>

  <!-- API Gateway -->
  <rect x="200" y="196" width="380" height="46" rx="8" fill="#E0F5EE" stroke="#1A8C68" stroke-width="0.8"/>
  <text x="390" y="216" font-size="13" font-weight="600" fill="#0A5C42" text-anchor="middle">API Gateway</text>
  <text x="390" y="232" font-size="11" fill="#1A7055" text-anchor="middle">jobtrackr-gateway.onrender.com · Spring Cloud Gateway</text>

  <!-- Arrows Gateway to 3 services -->
  <line x1="274" y1="242" x2="148" y2="292" stroke="#bbb" stroke-width="0.8" marker-end="url(#a1)"/>
  <line x1="360" y1="242" x2="330" y2="292" stroke="#bbb" stroke-width="0.8" marker-end="url(#a1)"/>
  <line x1="466" y1="242" x2="564" y2="292" stroke="#bbb" stroke-width="0.8" marker-end="url(#a1)"/>

  <!-- User Service -->
  <rect x="44" y="294" width="208" height="66" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="148" y="315" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">User Service</text>
  <text x="148" y="331" font-size="10" fill="#2B5F9E" text-anchor="middle">Auth · JWT · OAuth2 (Google)</text>
  <text x="148" y="347" font-size="10" fill="#2B5F9E" text-anchor="middle">jobtrackr-user.onrender.com</text>

  <!-- Application Service -->
  <rect x="264" y="294" width="208" height="66" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="368" y="315" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Application Service</text>
  <text x="368" y="331" font-size="10" fill="#2B5F9E" text-anchor="middle">CRUD · Pipeline · Kafka producer</text>
  <text x="368" y="347" font-size="10" fill="#2B5F9E" text-anchor="middle">jobtrackr-app.onrender.com</text>

  <!-- Analytics Service -->
  <rect x="484" y="294" width="248" height="66" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="608" y="315" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Analytics Service</text>
  <text x="608" y="331" font-size="10" fill="#2B5F9E" text-anchor="middle">MongoDB · CQRS · Charts</text>
  <text x="608" y="347" font-size="10" fill="#2B5F9E" text-anchor="middle">jobtrackr-analytics.onrender.com</text>

  <!-- CI/CD note -->
  <text x="724" y="230" font-size="10" fill="#bbb" text-anchor="middle">GitHub</text>
  <text x="724" y="243" font-size="10" fill="#bbb" text-anchor="middle">Actions</text>
  <line x1="714" y1="236" x2="692" y2="226" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#a1)"/>

  <!-- MANAGED SERVICES ZONE -->
  <rect x="24" y="404" width="732" height="208" rx="10" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="40" y="422" font-size="10" fill="#bbb">Managed cloud services — all free tiers, no expiry (except Neon 512MB / Atlas 512MB)</text>

  <!-- Row 1 -->
  <rect x="40" y="430" width="176" height="66" rx="8" fill="#E8F5E4" stroke="#3A7A20" stroke-width="0.8"/>
  <text x="128" y="451" font-size="12" font-weight="600" fill="#235010" text-anchor="middle">Neon PostgreSQL</text>
  <text x="128" y="467" font-size="10" fill="#3A6A18" text-anchor="middle">User + Application DBs</text>
  <text x="128" y="482" font-size="10" fill="#3A6A18" text-anchor="middle">512MB · always free</text>

  <rect x="232" y="430" width="172" height="66" rx="8" fill="#E8F5E4" stroke="#3A7A20" stroke-width="0.8"/>
  <text x="318" y="451" font-size="12" font-weight="600" fill="#235010" text-anchor="middle">MongoDB Atlas</text>
  <text x="318" y="467" font-size="10" fill="#3A6A18" text-anchor="middle">Analytics DB</text>
  <text x="318" y="482" font-size="10" fill="#3A6A18" text-anchor="middle">512MB · always free</text>

  <rect x="420" y="430" width="162" height="66" rx="8" fill="#FCEAEA" stroke="#A03030" stroke-width="0.8"/>
  <text x="501" y="451" font-size="12" font-weight="600" fill="#6A1A1A" text-anchor="middle">Upstash Redis</text>
  <text x="501" y="467" font-size="10" fill="#8A2A2A" text-anchor="middle">Cache · Rate limit</text>
  <text x="501" y="482" font-size="10" fill="#8A2A2A" text-anchor="middle">10k cmds/day free</text>

  <rect x="598" y="430" width="158" height="66" rx="8" fill="#F0F0EF" stroke="#999" stroke-width="0.8"/>
  <text x="677" y="451" font-size="12" font-weight="600" fill="#333" text-anchor="middle">Cloudflare R2</text>
  <text x="677" y="467" font-size="10" fill="#666" text-anchor="middle">File storage (S3-compat)</text>
  <text x="677" y="482" font-size="10" fill="#666" text-anchor="middle">10GB · always free</text>

  <!-- Row 2 -->
  <rect x="136" y="514" width="224" height="66" rx="8" fill="#FDF3DC" stroke="#C49020" stroke-width="0.8"/>
  <text x="248" y="535" font-size="12" font-weight="600" fill="#7A5C10" text-anchor="middle">Upstash Kafka</text>
  <text x="248" y="551" font-size="10" fill="#9A7420" text-anchor="middle">Event bus (HTTP-based)</text>
  <text x="248" y="566" font-size="10" fill="#9A7420" text-anchor="middle">10k messages/day free</text>

  <rect x="376" y="514" width="224" height="66" rx="8" fill="#FBE9E3" stroke="#C0522A" stroke-width="0.8"/>
  <text x="488" y="535" font-size="12" font-weight="600" fill="#7A2E10" text-anchor="middle">Resend</text>
  <text x="488" y="551" font-size="10" fill="#993C1D" text-anchor="middle">Transactional email</text>
  <text x="488" y="566" font-size="10" fill="#993C1D" text-anchor="middle">3000 emails/month free</text>

  <!-- Connector lines services to managed -->
  <line x1="148" y1="360" x2="128" y2="430" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>
  <line x1="368" y1="360" x2="280" y2="430" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>
  <line x1="608" y1="360" x2="345" y2="430" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>
  <line x1="148" y1="360" x2="470" y2="430" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>
  <line x1="368" y1="360" x2="240" y2="514" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>
  <line x1="608" y1="360" x2="462" y2="514" stroke="#eee" stroke-width="0.8" marker-end="url(#a2)"/>

  <!-- LOCAL ONLY ZONE -->
  <rect x="24" y="638" width="732" height="118" rx="10" fill="none" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="40" y="656" font-size="10" fill="#ccc">Local dev only — fully built and tested, not deployed (Render free tier limit — 4 services max)</text>

  <rect x="44" y="664" width="158" height="52" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="0.8"/>
  <text x="123" y="684" font-size="11" font-weight="600" fill="#aaa" text-anchor="middle">Reminder Service</text>
  <text x="123" y="700" font-size="10" fill="#ccc" text-anchor="middle">Scheduler · :8083</text>

  <rect x="218" y="664" width="158" height="52" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="0.8"/>
  <text x="297" y="684" font-size="11" font-weight="600" fill="#aaa" text-anchor="middle">Document Service</text>
  <text x="297" y="700" font-size="10" fill="#ccc" text-anchor="middle">Upload · MinIO · :8084</text>

  <rect x="392" y="664" width="158" height="52" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="0.8"/>
  <text x="471" y="684" font-size="11" font-weight="600" fill="#aaa" text-anchor="middle">Contact Service</text>
  <text x="471" y="700" font-size="10" fill="#ccc" text-anchor="middle">MongoDB · :8085</text>

  <rect x="566" y="664" width="180" height="52" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="0.8"/>
  <text x="656" y="684" font-size="11" font-weight="600" fill="#aaa" text-anchor="middle">Notification Service</text>
  <text x="656" y="700" font-size="10" fill="#ccc" text-anchor="middle">Email · WebSocket · :8086</text>

  <text x="390" y="738" font-size="10" fill="#ddd" text-anchor="middle">Local Docker Compose also runs: PostgreSQL · MongoDB · Redis · Kafka · MinIO · MailHog · Eureka :8761</text>
</svg>
