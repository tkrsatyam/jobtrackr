  <text x="672" y="68" font-size="11" font-weight="600" fill="#888" text-anchor="middle">Consumers</text>

  <!-- Divider lines under header -->
  <line x1="24" y1="74" x2="756" y2="74" stroke="#f0f0f0" stroke-width="1"/>

