name: Sync GitHub Issue → Jira

on:
  issues:
    types: [labeled]

jobs:
  create-jira-bug:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check if Jira bug already exists
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const alreadySynced = labels.includes('jira-synced');
            core.setOutput('SKIP', alreadySynced ? 'true' : 'false');

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Jira Bug
        id: create
        if: steps.check.outputs.SKIP == 'false'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_AUTH_TOKEN: ${{ secrets.JIRA_AUTH_TOKEN }}
        run: |
          npm install markdown-to-adf
          
          cat > create-jira-bug.mjs << 'SCRIPT'
          import { markdownToAdf } from './node_modules/markdown-to-adf/dist/index.js';
          import { execSync } from 'child_process';
          import { writeFileSync } from 'fs';
          
          const number = process.env.ISSUE_NUMBER;
          const title = process.env.ISSUE_TITLE;
          const url = process.env.ISSUE_URL;
          const body = process.env.ISSUE_BODY || '';
          
          const fullMarkdown = `GitHub Issue: ${url}\n\n${body}`;
          const adf = markdownToAdf(fullMarkdown);
          
          const payload = JSON.stringify({
            fields: {
              project: { key: 'JD' },
              summary: `[GitHub Issue #${number}] ${title}`,
              description: adf,
              issuetype: { name: 'Bug' },
              labels: ['github-sync'],
              customfield_10109: parseInt(number)
            }
          });
          
          writeFileSync('/tmp/jira-payload.json', payload);
          
          const response = execSync(
            `curl -s -X POST "${process.env.JIRA_BASE_URL}/rest/api/3/issue" \
            -H "Authorization: Basic ${process.env.JIRA_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/jira-payload.json`
          ).toString();
          
          console.log('Jira response:', response);
          
          let key;
          try {
            key = JSON.parse(response).key;
          } catch(e) {
            console.error('Failed to parse Jira response:', response);
            process.exit(1);
          }
          
          if (!key) {
            console.error('No key returned. Full response:', response);
            process.exit(1);
          }
          
          execSync(`echo "JIRA_KEY=${key}" >> ${process.env.GITHUB_OUTPUT}`);
          SCRIPT
          
          node create-jira-bug.mjs
          echo "JIRA_KEY=$(grep JIRA_KEY $GITHUB_OUTPUT | tail -1 | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Comment Jira link on GitHub issue
        if: steps.check.outputs.SKIP == 'false' && steps.create.outputs.JIRA_KEY != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🐛 Jira Bug created: [${{ steps.create.outputs.JIRA_KEY }}](${{ secrets.JIRA_BASE_URL }}/browse/${{ steps.create.outputs.JIRA_KEY }})`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['jira-synced']
            });