  <text x="88" y="266" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Document Svc</text>
  <text x="88" y="282" font-size="10" fill="#2B5F9E" text-anchor="middle">:8084</text>

  <rect x="14" y="318" width="148" height="44" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="88" y="338" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">User Svc</text>
  <text x="88" y="354" font-size="10" fill="#2B5F9E" text-anchor="middle">:8081</text>

