<svg width="780" height="380" viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="kp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C49020" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="kc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C0522A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; }
  </style>

  <rect width="780" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="26" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">JobTrackr — Kafka Event Flow</text>
  <text x="390" y="44" font-size="11" fill="#999" text-anchor="middle">Which services produce and consume each topic · Local: Apache Kafka · Prod: Upstash Kafka</text>

  <!-- Column headers -->
