name: Build, Push, Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      application: ${{ steps.filter.outputs.application }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'services/api-gateway/**'
            user:
              - 'services/user-service/**'
            application:
              - 'services/application-service/**'

  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        working-directory: services/api-gateway
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jobtrackr-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_GATEWAY_HOOK }}"

  build-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        working-directory: services/user-service
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/user-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jobtrackr-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_USER_HOOK }}"

  build-application-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.application == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        working-directory: services/application-service
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/application-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jobtrackr-application-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_APP_HOOK }}"