  <rect x="14" y="84" width="148" height="52" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="88" y="106" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Application Svc</text>
  <text x="88" y="122" font-size="10" fill="#2B5F9E" text-anchor="middle">:8082</text>

  <rect x="14" y="164" width="148" height="52" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
