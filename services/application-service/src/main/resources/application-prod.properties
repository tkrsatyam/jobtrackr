# --- Production profile: Application Service ---
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# --- Database (Neon) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- Redis (Upstash) ---
spring.data.redis.url=${REDIS_URL}

# Kafka intentionally omitted ? KafkaProducerConfig is @Profile("!prod"),
# ApplicationEventProducer's log-only stub handles this fine for now.

spring.jpa.show-sql=false

logging.level.com.jobtrackr.application_service=INFO