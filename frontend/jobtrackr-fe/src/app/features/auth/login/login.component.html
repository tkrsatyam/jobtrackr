<div class="auth-topbar">
    <a href="" class="auth-brand">JobTrackr</a>
</div>

<div class="auth-container">
    <mat-card class="auth-card">
        <mat-card-header>
            <mat-card-title>Login to JobTrackr</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="form" (ngSubmit)="submit()">
                <mat-form-field appearance="outline" class="full-width compact-fields">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" type="email" autocomplete="email">
                    @if (form.get('email')?.hasError('email')) {
                        <mat-error>Enter a valid email</mat-error>
                    }
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width compact-fields">
                    <mat-label>Password</mat-label>
                    <input
                        matInput
                        formControlName="password"
                        [type]="showPassword()? 'text': 'password'"
                        autocomplete="current-password">
                    <button
                        mat-icon-button
                        matSuffix
                        type="button"
                        (click)="showPassword.update(v => !v)"
                        [attr.aria-label]="showPassword() ? 'Hide Password' : 'Show Password'">
                        <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>    
                    </button>
                    @if (form.get('password')?.hasError('password')) {
                        <mat-error>Password is required</mat-error>
                    }
                </mat-form-field>

                @if (error()) {
                    <p class="error-text">{{ error() }}</p>
                }

                <button mat-flat-button color="primary" type="submit" [disabled]="loading()" class="full-width">
                    @if (loading()) {
                        <mat-spinner diameter="20"/>
                    } @else { Login }
                </button>
            </form>
            <p class="auth-link">Don't have an account? <a routerLink="/register">Register</a></p>
        </mat-card-content>
    </mat-card>
</div>
