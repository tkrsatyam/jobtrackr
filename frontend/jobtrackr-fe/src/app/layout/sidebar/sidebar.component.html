<nav class="sidebar" [class.collapsed]="sidebarService.isCollapsed()"
     [attr.aria-expanded]="!sidebarService.isCollapsed()">

    <ul class="nav-list">
        @for (item of navItems; track item.route) {
            <li>
                <a  class="nav-item"
                    [routerLink]="item.route"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: item.exact }"
                    [matTooltip]="item.label"
                    [matTooltipDisabled]="!sidebarService.isCollapsed()"
                    matTooltipPosition="right"
                    matRipple>
                    <mat-icon>{{ item.icon }}</mat-icon>
                    <span class="nav-label">{{ item.label }}</span>
                </a>
            </li>
        }
    </ul>

    <div class="sidebar-footer">
        <button class="toggle-btn"
                (click)="sidebarService.toggle()"
                [matTooltip]="'Expand menu'"
                [matTooltipDisabled]="!sidebarService.isCollapsed()"
                matTooltipPosition="right"
                [attr.aria-label]="sidebarService.isCollapsed() ? 'Expand menu' : 'Collapse menu'">

            <svg xmlns="http://www.w3.org/2000/svg" width="16px" height="16px" fill="none"
                viewBox="0 0 16 17" role="img" aria-hidden="true"
                [style.transform]="sidebarService.isCollapsed() ? 'scaleX(-1)' : 'none'">
                <path fill="currentColor" fill-rule="evenodd"
                    d="M1.75 1.75A.75.75 0 0 0 1 2.5V15c0 .41.34.75.75.75H15v-1.5H5.5v-11H15v-1.5zM4 3.25H2.5v11H4zM9.81 9.5l1.22 1.22-1.06 1.06-2.5-2.5-.53-.53.53-.53 2.5-2.5 1.06 1.06L9.81 8H14v1.5z"
                    clip-rule="evenodd"/>
            </svg>

            <span class="nav-label">
                {{ sidebarService.isCollapsed() ? 'Expand menu' : 'Collapse menu' }}
            </span>
        </button>
    </div>

</nav>
