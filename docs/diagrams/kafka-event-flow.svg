  <rect x="218" y="130" width="344" height="34" rx="6" fill="#FDF3DC" stroke="#C49020" stroke-width="0.8"/>
  <text x="390" y="151" font-size="11" font-weight="600" fill="#7A5C10" text-anchor="middle">application.status.updated</text>

