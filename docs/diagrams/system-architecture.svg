<svg width="780" height="800" viewBox="0 0 780 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C0522A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="780" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="28" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">JobTrackr — System Architecture (Local / Full)</text>
  <text x="390" y="46" font-size="11" fill="#999" text-anchor="middle">All 9 services, Kafka event bus, and storage layers as they run in local development</text>

  <!-- LAYER LABELS -->
  <text x="12" y="88" font-size="10" fill="#bbb">Client</text>
  <text x="12" y="178" font-size="10" fill="#bbb">Gateway</text>
  <text x="12" y="308" font-size="10" fill="#bbb">Services</text>
  <text x="12" y="548" font-size="10" fill="#bbb">Events</text>
  <text x="12" y="688" font-size="10" fill="#bbb">Storage</text>

  <!-- ANGULAR -->
  <rect x="250" y="58" width="280" height="50" rx="8" fill="#EDE9FD" stroke="#7C6EE0" stroke-width="0.8"/>
  <text x="390" y="79" font-size="13" font-weight="600" fill="#3D2FA0" text-anchor="middle">Angular SPA</text>
  <text x="390" y="96" font-size="11" fill="#5A4CB8" text-anchor="middle">HttpInterceptor · WebSocket · Lazy modules</text>

  <!-- Arrow Angular to Gateway -->
  <line x1="390" y1="108" x2="390" y2="148" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text x="402" y="132" font-size="10" fill="#bbb">REST / WSS</text>

  <!-- API GATEWAY -->
  <rect x="200" y="150" width="380" height="50" rx="8" fill="#E0F5EE" stroke="#1A8C68" stroke-width="0.8"/>
  <text x="390" y="171" font-size="13" font-weight="600" fill="#0A5C42" text-anchor="middle">API Gateway — Spring Cloud Gateway</text>
  <text x="390" y="188" font-size="11" fill="#1A7055" text-anchor="middle">JWT validation · Routing · Rate limiting (Redis)</text>

  <!-- EUREKA -->
  <rect x="614" y="150" width="148" height="50" rx="8" fill="#F0F0EF" stroke="#999" stroke-width="0.8"/>
  <text x="688" y="171" font-size="12" font-weight="600" fill="#444" text-anchor="middle">Eureka Server</text>
  <text x="688" y="187" font-size="10" fill="#777" text-anchor="middle">Service discovery · :8761</text>
  <line x1="580" y1="175" x2="614" y2="175" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Arrows Gateway to Services row 1 -->
  <line x1="248" y1="200" x2="108" y2="268" stroke="#bbb" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="296" y1="200" x2="250" y2="268" stroke="#bbb" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="356" y1="200" x2="372" y2="268" stroke="#bbb" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="430" y1="200" x2="508" y2="268" stroke="#bbb" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="474" y1="200" x2="630" y2="268" stroke="#bbb" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- SERVICE ROW 1 — Core (Blue) -->
  <rect x="34" y="270" width="148" height="62" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="108" y="291" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">User Service</text>
  <text x="108" y="307" font-size="10" fill="#2B5F9E" text-anchor="middle">Auth · JWT · OAuth2</text>
  <text x="108" y="322" font-size="10" fill="#2B5F9E" text-anchor="middle">PostgreSQL · :8081</text>

  <rect x="194" y="270" width="148" height="62" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="268" y="291" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Application Svc</text>
  <text x="268" y="307" font-size="10" fill="#2B5F9E" text-anchor="middle">CRUD · Pipeline</text>
  <text x="268" y="322" font-size="10" fill="#2B5F9E" text-anchor="middle">PostgreSQL · :8082</text>

  <rect x="354" y="270" width="148" height="62" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="428" y="291" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Reminder Svc</text>
  <text x="428" y="307" font-size="10" fill="#2B5F9E" text-anchor="middle">Scheduler · Alerts</text>
  <text x="428" y="322" font-size="10" fill="#2B5F9E" text-anchor="middle">PostgreSQL · :8083</text>

  <rect x="514" y="270" width="148" height="62" rx="8" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="588" y="291" font-size="12" font-weight="600" fill="#1A4A80" text-anchor="middle">Document Svc</text>
  <text x="588" y="307" font-size="10" fill="#2B5F9E" text-anchor="middle">Upload · Versioning</text>
  <text x="588" y="322" font-size="10" fill="#2B5F9E" text-anchor="middle">PostgreSQL · :8084</text>

  <!-- SERVICE ROW 2 — Event-driven (Coral) -->
  <rect x="114" y="356" width="148" height="62" rx="8" fill="#FBE9E3" stroke="#C0522A" stroke-width="0.8"/>
  <text x="188" y="377" font-size="12" font-weight="600" fill="#7A2E10" text-anchor="middle">Contact Svc</text>
  <text x="188" y="393" font-size="10" fill="#993C1D" text-anchor="middle">Contacts · Interactions</text>
  <text x="188" y="408" font-size="10" fill="#993C1D" text-anchor="middle">MongoDB · :8085</text>

  <rect x="314" y="356" width="148" height="62" rx="8" fill="#FBE9E3" stroke="#C0522A" stroke-width="0.8"/>
  <text x="388" y="377" font-size="12" font-weight="600" fill="#7A2E10" text-anchor="middle">Notification Svc</text>
  <text x="388" y="393" font-size="10" fill="#993C1D" text-anchor="middle">Email · WebSocket</text>
  <text x="388" y="408" font-size="10" fill="#993C1D" text-anchor="middle">MongoDB · :8086</text>

  <rect x="514" y="356" width="148" height="62" rx="8" fill="#FBE9E3" stroke="#C0522A" stroke-width="0.8"/>
  <text x="588" y="377" font-size="12" font-weight="600" fill="#7A2E10" text-anchor="middle">Analytics Svc</text>
  <text x="588" y="393" font-size="10" fill="#993C1D" text-anchor="middle">Aggregations · CQRS</text>
  <text x="588" y="408" font-size="10" fill="#993C1D" text-anchor="middle">MongoDB · :8087</text>

  <!-- KAFKA -->
  <rect x="60" y="460" width="660" height="56" rx="8" fill="#FDF3DC" stroke="#C49020" stroke-width="0.8"/>
  <text x="390" y="481" font-size="13" font-weight="600" fill="#7A5C10" text-anchor="middle">Apache Kafka — Event Bus</text>
  <text x="390" y="498" font-size="10" fill="#9A7420" text-anchor="middle">application.created · application.status.updated · application.deleted · reminder.triggered · document.uploaded · user.registered</text>

  <!-- Producer arrows to Kafka -->
  <line x1="268" y1="332" x2="240" y2="460" stroke="#C49020" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="428" y1="332" x2="380" y2="460" stroke="#C49020" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="588" y1="332" x2="524" y2="460" stroke="#C49020" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- Consumer arrows from Kafka (dashed coral) -->
  <line x1="210" y1="516" x2="188" y2="418" stroke="#C0522A" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrd)"/>
  <line x1="330" y1="516" x2="360" y2="418" stroke="#C0522A" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrd)"/>
  <line x1="490" y1="516" x2="548" y2="418" stroke="#C0522A" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrd)"/>

  <!-- Arrow legend -->
  <line x1="60" y1="534" x2="90" y2="534" stroke="#C49020" stroke-width="1" marker-end="url(#arr)"/>
  <text x="96" y="538" font-size="10" fill="#999">Kafka producer</text>
  <line x1="200" y1="534" x2="230" y2="534" stroke="#C0522A" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrd)"/>
  <text x="236" y="538" font-size="10" fill="#999">Kafka consumer</text>
  <line x1="370" y1="534" x2="400" y2="534" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <text x="406" y="538" font-size="10" fill="#999">Sync REST</text>

  <!-- STORAGE ROW -->
  <rect x="34" y="604" width="168" height="66" rx="8" fill="#E8F5E4" stroke="#3A7A20" stroke-width="0.8"/>
  <text x="118" y="625" font-size="12" font-weight="600" fill="#235010" text-anchor="middle">PostgreSQL</text>
  <text x="118" y="641" font-size="10" fill="#3A6A18" text-anchor="middle">User · Application</text>
  <text x="118" y="656" font-size="10" fill="#3A6A18" text-anchor="middle">Reminder · Document</text>

  <rect x="218" y="604" width="168" height="66" rx="8" fill="#E8F5E4" stroke="#3A7A20" stroke-width="0.8"/>
  <text x="302" y="625" font-size="12" font-weight="600" fill="#235010" text-anchor="middle">MongoDB</text>
  <text x="302" y="641" font-size="10" fill="#3A6A18" text-anchor="middle">Contact · Notification</text>
  <text x="302" y="656" font-size="10" fill="#3A6A18" text-anchor="middle">Analytics</text>

  <rect x="402" y="604" width="148" height="66" rx="8" fill="#FCEAEA" stroke="#A03030" stroke-width="0.8"/>
  <text x="476" y="625" font-size="12" font-weight="600" fill="#6A1A1A" text-anchor="middle">Redis</text>
  <text x="476" y="641" font-size="10" fill="#8A2A2A" text-anchor="middle">JWT blacklist · Cache</text>
  <text x="476" y="656" font-size="10" fill="#8A2A2A" text-anchor="middle">Rate limiting</text>

  <rect x="566" y="604" width="148" height="66" rx="8" fill="#F0F0EF" stroke="#999" stroke-width="0.8"/>
  <text x="640" y="625" font-size="12" font-weight="600" fill="#333" text-anchor="middle">MinIO</text>
  <text x="640" y="641" font-size="10" fill="#666" text-anchor="middle">Resume · Cover letter</text>
  <text x="640" y="656" font-size="10" fill="#666" text-anchor="middle">S3-compatible · :9000</text>

  <!-- Storage connector lines -->
  <line x1="108" y1="332" x2="108" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="268" y1="332" x2="230" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="188" y1="418" x2="272" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="388" y1="418" x2="320" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="588" y1="418" x2="335" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="428" y1="332" x2="458" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>
  <line x1="588" y1="332" x2="614" y2="604" stroke="#eee" stroke-width="0.8" marker-end="url(#arrl)"/>

  <!-- Port footer -->
  <text x="390" y="750" font-size="10" fill="#ccc" text-anchor="middle">Ports — Gateway:8080 · User:8081 · Application:8082 · Reminder:8083 · Document:8084 · Contact:8085 · Notification:8086 · Analytics:8087 · Eureka:8761</text>

  <!-- Color legend -->
  <rect x="60" y="764" width="12" height="12" rx="2" fill="#E4EEF9" stroke="#2B6CB0" stroke-width="0.8"/>
  <text x="78" y="774" font-size="10" fill="#666">Core services (PostgreSQL)</text>
  <rect x="260" y="764" width="12" height="12" rx="2" fill="#FBE9E3" stroke="#C0522A" stroke-width="0.8"/>
  <text x="278" y="774" font-size="10" fill="#666">Event-driven services (MongoDB)</text>
  <rect x="490" y="764" width="12" height="12" rx="2" fill="#FDF3DC" stroke="#C49020" stroke-width="0.8"/>
  <text x="508" y="774" font-size="10" fill="#666">Kafka event bus</text>
</svg>
