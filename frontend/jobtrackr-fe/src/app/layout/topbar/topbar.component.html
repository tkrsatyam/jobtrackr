<header class="topbar">

    <div class="topbar-brand">
        <a href="" class="brand-text">JobTrackr</a>
    </div>

    <span class="topbar-spacer"></span>

    <div class="topbar-actions">
        <button
            mat-icon-button
            role="switch"
            [attr.aria-checked]="themeService.theme() === 'dark'"
            [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
            [matTooltip]="themeService.theme() === 'dark' ? 'Light mode' : 'Dark mode'"
            (click)="themeService.toggle()">
            <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>    
        </button>

        <button mat-icon-button [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
            @if (currentUser()) {
                <div class="user-menu-header">
                    <p class="user-name">{{ currentUser()?.fullName }}</p>
                    <p class="user-email">{{ currentUser()?.email }}</p>
                </div>
            }

            <button mat-menu-item routerLink="/settings">
                <mat-icon>settings</mat-icon> Settings
            </button>

            <button mat-menu-item (click)="logout()">
                <mat-icon>logout</mat-icon> Logout
            </button>
        </mat-menu>
    </div>
</header>
