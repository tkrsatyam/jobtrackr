# --- Production profile: API Gateway ---
# No Eureka in prod ? routing uses fixed URLs instead (see app.services.* and
# GatewayRoutesProdConfig).
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# --- Redis (Upstash) ---
spring.data.redis.url=${REDIS_URL}

# --- Downstream service URLs (Render) ? used by GatewayRoutesProdConfig ---
app.services.user-service-url=${USER_SERVICE_URL}
app.services.application-service-url=${APPLICATION_SERVICE_URL}

# --- CORS ---
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# --- JWT secret (must match User Service exactly) ---
app.jwt.secret=${JWT_SECRET}

logging.level.com.jobtrackr.api_gateway=INFO